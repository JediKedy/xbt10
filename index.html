<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBT-10 Ultra Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 600: '#0284c7', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        [v-cloak] { display: none; }
        /* Performans üçün hardware acceleration */
        .smooth-render { transform: translateZ(0); backface-visibility: hidden; }
        /* Sadə keçid animasiyası */
        .v-enter-active, .v-leave-active { transition: opacity 0.2s ease; }
        .v-enter-from, .v-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen smooth-render">

<div id="app" v-cloak class="max-w-4xl mx-auto px-4 py-8">
    
    <nav class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black tracking-tighter dark:text-white uppercase">XBT-10 <span class="text-primary-600 text-sm">v2.0</span></h1>
        <button @click="toggleDarkMode" class="p-3 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800">
            {{ isDark ? '☀️' : '🌙' }}
        </button>
    </nav>

    <div class="sticky top-4 z-50 mb-8">
        <div class="relative shadow-2xl rounded-2xl overflow-hidden">
            <input 
                v-model="searchQuery" 
                type="text" 
                placeholder="Kod və ya diaqnoz axtar..." 
                class="w-full p-5 pl-7 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-none outline-none text-lg ring-1 ring-slate-200 dark:ring-slate-800 focus:ring-2 focus:ring-primary-600 transition-all"
            >
            <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-5 top-1/2 -translate-y-1/2 p-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <div v-if="searchQuery" class="mb-4 text-sm font-medium text-slate-500 px-2">
        Tapılan bölmə sayı: {{ Object.keys(processedData).length }}
    </div>

    <div v-if="loading" class="flex justify-center py-20 italic text-slate-400">Yüklənir...</div>

    <div v-else class="space-y-4">
        <div v-for="(items, category) in processedData" :key="category" 
             class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
            
            <div @click="toggleMain(category)" class="p-4 cursor-pointer flex justify-between items-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                <h2 class="font-bold text-slate-800 dark:text-slate-200 text-sm md:text-base leading-snug">{{ category }}</h2>
                <svg :class="{'rotate-180 text-primary-600': openMain === category}" class="w-5 h-5 text-slate-300 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>

            <div v-if="openMain === category || searchQuery" class="border-t border-slate-100 dark:border-slate-800">
                <div v-for="(subItems, groupCode) in items" :key="groupCode" class="border-b border-slate-50 dark:border-slate-800 last:border-0">
                    <div @click="toggleSub(groupCode)" class="p-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="bg-primary-100 dark:bg-primary-900/40 text-primary-700 dark:text-primary-300 font-mono font-bold text-xs px-2 py-1 rounded">
                                {{ groupCode }}
                            </span>
                            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">{{ subItems.main.description }}</span>
                        </div>
                    </div>

                    <div v-if="openSub === groupCode || searchQuery" class="bg-slate-50/50 dark:bg-slate-800/30 p-2 pl-4">
                        <div v-for="child in subItems.children" :key="child.code" class="flex items-start gap-3 p-2 text-sm">
                            <span class="text-primary-600 font-mono font-bold">{{ child.code }}</span>
                            <span class="text-slate-600 dark:text-slate-400 leading-tight">{{ child.description }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue

createApp({
    setup() {
        const searchQuery = ref('')
        const rawData = ref({})
        const loading = ref(true)
        const openMain = ref(null)
        const openSub = ref(null)
        const isDark = ref(localStorage.getItem('theme') === 'dark')

        const toggleDarkMode = () => {
            isDark.value = !isDark.value
            document.documentElement.classList.toggle('dark')
            localStorage.setItem('theme', isDark.value ? 'dark' : 'light')
        }

        onMounted(async () => {
            try {
                const res = await fetch('https://raw.githubusercontent.com/JediKedy/xbt10_data/refs/heads/main/data.json');
                const json = await res.json();
                // Obyekti dondururuq (Freeze) ki, Vue hər bir element üçün lazımsız "observer" yaratmasın (Performans artımı)
                rawData.value = Object.freeze(json.data);
            } finally { loading.value = false; }
            if (isDark.value) document.documentElement.classList.add('dark');
        })

        const processedData = computed(() => {
            const q = searchQuery.value.toLowerCase().trim()
            if (!q) return rawData.value ? transform(rawData.value) : {}

            const filtered = {}
            for (const [cat, items] of Object.entries(rawData.value)) {
                const matches = items.filter(i => i.code.toLowerCase().includes(q) || i.description.toLowerCase().includes(q))
                if (matches.length > 0) filtered[cat] = matches
            }
            return transform(filtered)
        })

        // Köməkçi funksiya: Datanı iyerarxiyaya salır
        function transform(data) {
            const structured = {}
            for (const [cat, items] of Object.entries(data)) {
                const groups = {}
                items.forEach(i => {
                    if (!i.code.includes('.')) groups[i.code] = { main: i, children: [] }
                    else {
                        const p = i.code.split('.')[0]
                        if (groups[p]) groups[p].children.push(i)
                        else groups[i.code] = { main: i, children: [] } // Əgər ana kodu yoxdursa özünü ana et
                    }
                })
                structured[cat] = groups
            }
            return structured
        }

        const toggleMain = (cat) => openMain.value = openMain.value === cat ? null : cat
        const toggleSub = (code) => openSub.value = openSub.value === code ? null : code

        return { searchQuery, processedData, loading, openMain, openSub, toggleMain, toggleSub, isDark, toggleDarkMode }
    }
}).mount('#app')
</script>
</body>
</html>

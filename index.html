<!DOCTYPE html>
<html lang="az" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XBT-10</title>

    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="app-icon-512x512.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        };
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <style>
        [v-cloak] { display: none }
        .acc-enter-active, .acc-leave-active { transition: all 0.2s ease-out; max-height: 2000px; overflow: hidden; }
        .acc-enter-from, .acc-leave-to { max-height: 0; opacity: 0; }
        .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        input[type="search"]::-webkit-search-cancel-button { display: none; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen transition-colors duration-300">

<div id="app" v-cloak>
    <nav class="fixed w-full z-50 top-0 bg-white/70 dark:bg-zinc-950/70 border-b border-zinc-100 dark:border-zinc-800 glass">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-indigo-600"></span>
                <h1 class="text-lg font-extrabold tracking-tighter uppercase">XBT-10</h1>
                <span v-if="!isOnline" class="ml-2 px-2 py-0.5 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-[10px] font-bold uppercase">Offline</span>
            </div>

            <div class="flex items-center gap-3">
                <button v-if="pwaPrompt" @click="installPWA" class="p-2 rounded-xl border border-indigo-200 dark:border-indigo-800 text-indigo-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                </button>
                <button @click="toggleDark" class="p-2 rounded-xl border border-zinc-200 dark:border-zinc-800">
                    <svg v-if="isDark" class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0Z"/></svg>
                    <svg v-else class="w-5 h-5 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998Z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-28 pb-20">
        <div class="mb-8 sticky top-20 z-40">
            <div class="relative group">
                <input
                    v-model.trim="query"
                    type="search"
                    placeholder="Kod və ya diaqnoz axtar..."
                    class="w-full p-5 pr-14 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-lg shadow-sm"
                >
                <div class="absolute right-5 top-1/2 -translate-y-1/2 flex items-center gap-2">
                    <button v-if="query" @click="query = ''" class="text-zinc-400 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                    <svg class="w-5 h-5 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
        </div>

        <div v-if="loading" class="py-20 text-center">
            <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-zinc-500 font-medium">Məlumatlar yüklənir...</p>
        </div>

        <div v-else-if="error" class="py-20 text-center">
            <p class="text-red-500 font-bold">{{ error }}</p>
            <button @click="fetchData" class="mt-4 text-indigo-600 underline">Yenidən cəhd et</button>
        </div>

        <div v-else class="space-y-4">
            <div v-for="(groups, category) in filteredData" :key="category" 
                 class="bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-800 rounded-2xl overflow-hidden shadow-sm">
                
                <button @click="toggleMain(category)" 
                        class="w-full p-5 flex justify-between items-center hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-colors text-left">
                    <span class="font-bold text-sm sm:text-base pr-4">{{ category }}</span>
                    <svg :class="{'rotate-180 text-indigo-500': openMain === category || query}" 
                         class="w-5 h-5 text-zinc-300 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>

                <transition name="acc">
                    <div v-if="openMain === category || query" class="px-5 pb-5 space-y-2 border-t border-zinc-50 dark:border-zinc-800">
                        <div v-for="(sub, groupCode) in groups" :key="groupCode" class="mt-4">
                            <button @click="toggleSub(groupCode)" class="w-full flex items-start gap-3 text-left group">
                                <span class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 font-mono text-xs font-bold px-2 py-1 rounded-lg">
                                    {{ groupCode }}
                                </span>
                                <span class="text-sm font-semibold group-hover:text-indigo-600 transition-colors">
                                    {{ sub.main.description }}
                                </span>
                            </button>

                            <transition name="acc">
                                <ul v-if="openSub === groupCode || query" class="mt-3 ml-4 pl-4 border-l-2 border-indigo-100 dark:border-indigo-900/50 space-y-3">
                                    <li v-for="child in sub.children" :key="child.code" class="text-sm flex gap-3">
                                        <span class="text-indigo-500 font-mono font-bold">{{ child.code }}</span>
                                        <span class="text-zinc-600 dark:text-zinc-400">{{ child.description }}</span>
                                    </li>
                                </ul>
                            </transition>
                        </div>
                    </div>
                </transition>
            </div>

            <div v-if="Object.keys(filteredData).length === 0" class="py-20 text-center text-zinc-400 italic">
                Nəticə tapılmadı.
            </div>
        </div>
    </main>

    <footer class="py-10 border-t border-zinc-100 dark:border-zinc-900 text-[10px] text-zinc-400 text-center">
        <p>© 2026 XBT-10 Təsnifatı</p>
    </footer>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;

createApp({
    setup() {
        const query = ref('');
        const rawData = ref({});
        const loading = ref(true);
        const error = ref(null);
        const openMain = ref(null);
        const openSub = ref(null);
        const isDark = ref(document.documentElement.classList.contains('dark'));
        const isOnline = ref(navigator.onLine);
        const pwaPrompt = ref(null);

        const toggleDark = () => {
            isDark.value = !isDark.value;
            document.documentElement.classList.toggle('dark', isDark.value);
            localStorage.setItem('theme', isDark.value ? 'dark' : 'light');
        };

        const fetchData = async () => {
            loading.value = true;
            try {
                const res = await fetch('data.json');
                if (!res.ok) throw new Error('Data tapılmadı');
                const json = await res.json();
                
                // Datanı birbaşa strukturlaşdırırıq (Performans üçün 1 dəfə)
                const transformed = {};
                for (const [cat, items] of Object.entries(json.data || {})) {
                    const groups = {};
                    items.forEach(item => {
                        const isParent = !item.code.includes('.');
                        if (isParent) {
                            groups[item.code] = { main: item, children: groups[item.code]?.children || [] };
                        } else {
                            const pCode = item.code.split('.')[0];
                            if (!groups[pCode]) groups[pCode] = { main: { code: pCode, description: pCode }, children: [] };
                            groups[pCode].children.push(item);
                        }
                    });
                    transformed[cat] = groups;
                }
                rawData.value = Object.freeze(transformed);
            } catch (e) {
                error.value = "Məlumat bazası yüklənərkən xəta baş verdi.";
            } finally {
                loading.value = false;
            }
        };

        const filteredData = computed(() => {
            if (!query.value) return rawData.value;
            const q = query.value.toLowerCase();
            const result = {};

            for (const [cat, groups] of Object.entries(rawData.value)) {
                const filteredGroups = {};
                for (const [gCode, group] of Object.entries(groups)) {
                    const mainMatch = group.main.description.toLowerCase().includes(q) || gCode.toLowerCase().includes(q);
                    const filteredChildren = group.children.filter(c => 
                        c.code.toLowerCase().includes(q) || c.description.toLowerCase().includes(q)
                    );

                    if (mainMatch || filteredChildren.length) {
                        filteredGroups[gCode] = { ...group, children: mainMatch ? group.children : filteredChildren };
                    }
                }
                if (Object.keys(filteredGroups).length) result[cat] = filteredGroups;
            }
            return result;
        });

        const toggleMain = (cat) => openMain.value = openMain.value === cat ? null : cat;
        const toggleSub = (code) => openSub.value = openSub.value === code ? null : code;

        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); pwaPrompt.value = e; });
        const installPWA = () => { if(pwaPrompt.value) pwaPrompt.value.prompt(); };

        onMounted(fetchData);

        return { 
            query, loading, error, filteredData, openMain, openSub, 
            isDark, isOnline, pwaPrompt, toggleDark, toggleMain, toggleSub, fetchData, installPWA 
        };
    }
}).mount('#app');
</script>
</body>
</html>

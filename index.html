<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBT-10 Axtarış Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        .sticky-search { position: sticky; top: 1rem; z-index: 50; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-900">

<div id="app" v-cloak class="max-w-4xl mx-auto p-4 md:p-10">
    
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-black text-indigo-900 mb-2 tracking-tight">XBT-10 PORTALI</h1>
        <p class="text-gray-500 font-medium">Xəstəliklərin Beynəlxalq Təsnifatı üzrə onlayn axtarış</p>
    </header>

    <div class="sticky-search mb-8">
        <div class="relative shadow-2xl">
            <input 
                v-model="searchQuery" 
                type="text" 
                placeholder="Kod (məs: A01) və ya diaqnoz adı ilə axtar..." 
                class="w-full p-5 pl-7 rounded-2xl border-none ring-2 ring-indigo-100 focus:ring-4 focus:ring-indigo-500 transition-all text-lg outline-none bg-white/90 backdrop-blur-md"
            >
            <div class="absolute right-5 top-5">
                <svg v-if="!loading" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <div v-else class="animate-spin rounded-full h-7 w-7 border-b-2 border-indigo-600"></div>
            </div>
        </div>
    </div>

    <div v-if="error" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded shadow-md">
        <p class="font-bold">Xəta!</p>
        <p>Məlumatları yükləmək mümkün olmadı. Zəhmət olmasa internet bağlantınızı yoxlayın.</p>
    </div>

    <div v-if="Object.keys(groupedResults).length > 0" class="space-y-10">
        <section v-for="(items, category) in groupedResults" :key="category" class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-indigo-600 px-6 py-4">
                <h2 class="text-white font-bold text-sm md:text-base uppercase tracking-wider">
                    {{ category }}
                </h2>
            </div>
            
            <div class="divide-y divide-gray-100">
                <div v-for="item in items" :key="item.code" class="group p-5 hover:bg-indigo-50 transition-colors flex items-start gap-4">
                    <div class="flex-shrink-0">
                        <span class="inline-block bg-gray-100 group-hover:bg-indigo-200 text-indigo-800 font-mono font-bold text-sm px-3 py-1.5 rounded-lg border border-gray-200 transition-colors">
                            {{ item.code }}
                        </span>
                    </div>
                    <div class="flex-grow">
                        <p class="text-gray-800 font-semibold leading-snug group-hover:text-indigo-900 transition-colors">
                            {{ item.description }}
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div v-else-if="!loading" class="text-center py-24 bg-white rounded-3xl border-4 border-dashed border-gray-200">
        <div class="text-6xl mb-4">🔍</div>
        <p class="text-gray-400 text-xl font-medium">Uyğun məlumat tapılmadı.</p>
        <button @click="searchQuery = ''" class="mt-4 text-indigo-600 font-bold hover:underline">Axtarışı təmizlə</button>
    </div>

</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue

    createApp({
        setup() {
            const searchQuery = ref('')
            const icdData = ref({})
            const loading = ref(true)
            const error = ref(false)

            // GitHub-dakı JSON-dan datanı çəkirik
            const fetchData = async () => {
                const url = 'https://raw.githubusercontent.com/JediKedy/xbt10_data/refs/heads/main/data.json';
                try {
                    loading.value = true;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Network response was not ok');
                    icdData.value = await response.json();
                } catch (err) {
                    console.error("Məlumat xətası:", err);
                    error.value = true;
                } finally {
                    loading.value = false;
                }
            }

            onMounted(fetchData)

            // Axtarış məntiqi (Filtrləmə)
            const groupedResults = computed(() => {
                const query = searchQuery.value.toLowerCase().trim()
                const result = {}

                if (!icdData.value) return result

                for (const [category, items] of Object.entries(icdData.value)) {
                    const filteredItems = items.filter(item => 
                        item.code.toLowerCase().includes(query) || 
                        item.description.toLowerCase().includes(query)
                    )
                    
                    if (filteredItems.length > 0) {
                        result[category] = filteredItems
                    }
                }
                return result
            })

            return {
                searchQuery,
                groupedResults,
                loading,
                error
            }
        }
    }).mount('#app')
</script>

</body>
</html>
